name: Monitor Concorsi

on:
  schedule:
    - cron: "30 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_TO: ${{ secrets.SMTP_TO }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements_cloud.txt
          python -m playwright install chromium

      - name: Prepare folders
        run: |
          mkdir -p logs output data

      - name: Run full monitor pipeline
        run: |
          ERROR=0

          python scripts/monitor_concorsi.py >> logs/monitor.log 2>&1 || ERROR=1
          python scripts/monitor_v2.py >> logs/monitor_v2.log 2>&1 || ERROR=1
          python scripts/enrich_report_v2.py >> logs/enrich.log 2>&1 || ERROR=1
          python profilo_strategico/scripts/aggiorna_bandi_followup.py >> logs/followup.log 2>&1 || ERROR=1
          python scripts/send_report_email.py >> logs/mail.log 2>&1 || ERROR=1

          if [ "$ERROR" -ne 0 ]; then
            python scripts/send_error_email.py >> logs/mail.log 2>&1 || true
            exit 1
          fi

      - name: Commit seen links
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/seen_links.txt data/seen_links_v2.txt || true

          if git diff --cached --quiet; then
            echo "No seen links changes"
          else
            git commit -m "Update seen links"
            git pull --rebase origin main
            git push
          fi

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-output
          path: |
            output/
            logs/
            profilo_strategico/output/
            profilo_strategico/data/bandi_followup.csv
